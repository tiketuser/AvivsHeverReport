name: Hever Weekly Report

on:
  schedule:
    - cron: '0 5 * * 0'   # Every Sunday at 08:00 Israel time (UTC+3 = 05:00 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          HVR_ID: ${{ secrets.HVR_ID }}
          HVR_PASSWORD: ${{ secrets.HVR_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            docs/debug_login.png
            docs/debug_login.html

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Weekly update: $(date +'%Y-%m-%d')"
          git push
