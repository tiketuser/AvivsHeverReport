<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כרטיס חבר - דוח שבועי</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      direction: rtl;
    }

    header {
      background: #fff;
      border-bottom: 3px solid #0057b7;
      padding: 20px 28px 16px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0057b7;
    }

    .header-meta {
      font-size: 0.85rem;
      color: #777;
      margin-top: 5px;
    }

    .deals-section {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 18px 28px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 10px;
    }

    .deals-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      list-style: none;
    }

    .deal-item {
      background: #f5f8ff;
      border: 1px solid #d0ddf7;
      border-radius: 4px;
      padding: 5px 11px;
      font-size: 0.85rem;
      color: #222;
      line-height: 1.4;
    }

    .deal-sub {
      color: #777;
    }

    .search-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-bar h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      white-space: nowrap;
    }

    #search {
      flex: 1;
      min-width: 220px;
      max-width: 500px;
      padding: 9px 14px;
      font-size: 0.95rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-family: inherit;
      direction: rtl;
      background: #fafafa;
    }

    #search:focus {
      border-color: #0057b7;
      background: #fff;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 20px 48px;
    }

    #result-count {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: #0d1a2e;
      line-height: 1.3;
    }

    .card-type {
      font-size: 0.78rem;
      color: #0057b7;
      margin-top: 3px;
      font-weight: 500;
    }

    .card-body {
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      font-size: 0.83rem;
      align-items: flex-start;
      line-height: 1.4;
    }

    .detail-label {
      color: #aaa;
      min-width: 44px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .detail-value {
      color: #333;
    }

    .detail-value a {
      color: #0057b7;
      text-decoration: none;
      font-weight: 500;
    }

    .detail-value a:hover {
      text-decoration: underline;
    }

    .no-results {
      text-align: center;
      color: #aaa;
      font-size: 1rem;
      margin-top: 60px;
    }

    @media (max-width: 520px) {
      header h1 { font-size: 1.4rem; }
      .search-bar { flex-direction: column; align-items: stretch; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>כרטיס חבר - דוח שבועי</h1>
  <div class="header-meta" id="header-meta">טוען נתונים...</div>
</header>

<div class="deals-section" id="deals-section" style="display:none;">
  <div class="section-title">מבצעי השבוע</div>
  <ul class="deals-list" id="deals-list"></ul>
</div>

<div class="search-bar">
  <h2>חבר טעמים</h2>
  <input type="search" id="search" placeholder="חיפוש מסעדה, סוג, עיר..." autocomplete="off">
</div>

<main>
  <div id="result-count"></div>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="no-results" style="display:none;">לא נמצאו תוצאות</div>
</main>

<script>
  let allRestaurants = [];
  let searchIndex = [];

  const HE_MAP = {
    'א':'a','ב':'b','ג':'g','ד':'d','ה':'h','ו':'v','ז':'z',
    'ח':'h','ט':'t','י':'i','כ':'k','ך':'k','ל':'l','מ':'m',
    'ם':'m','נ':'n','ן':'n','ס':'s','ע':'','פ':'p','ף':'f',
    'צ':'ts','ץ':'ts','ק':'k','ר':'r','ש':'sh','ת':'t'
  };

  const ALIASES = [
    ['black','בלאק'],['burger','בורגר'],['burgers','בורגרס'],
    ['pizza','פיצה'],['cafe','קפה'],['coffee','קפה'],
    ['grill','גריל'],['bar','בר'],['sushi','סושי'],
    ['pasta','פסטה'],['steak','סטייק'],['steakhouse','סטייקהאוס'],
    ['shawarma','שווארמה'],['hummus','חומוס'],['falafel','פלאפל'],
    ['bakery','בייקרי'],['wok','וק'],['house','האוס'],
    ['garden','גארדן'],['street','סטריט'],['club','קלאב'],
    ['fresh','פרש'],['green','גרין'],['red','רד'],['blue','בלו'],
    ['gold','גולד'],['royal','רויאל'],['urban','אורבן'],
    ['express','אקספרס'],['chef','שף'],['art','ארט'],
    ['king','קינג'],['sweet','סוויט'],['spicy','ספייסי'],
    ['market','מרקט'],['kitchen','קיצ׳ן'],['bistro','ביסטרו'],
    ['republic','ריפבליק'],['max','מקס'],['fish','פיש'],
    ['meat','מיט'],['wings','וינגס'],['pita','פיתה'],
    ['noodles','נודלס'],['taco','טאקו'],['toast','טוסט'],
    ['ice','אייס'],['cream','קרים'],['gelato','ג׳לאטו'],
  ];

  function heToLatin(str) {
    return str.split('').map(c => HE_MAP[c] !== undefined ? HE_MAP[c] : c).join('');
  }

  function buildIndex(restaurants) {
    return restaurants.map(r => {
      const raw = [r.name, r.type, r.address].filter(Boolean).join(' ').toLowerCase();
      const latin = heToLatin(raw);
      let extra = '';
      for (const [en, he] of ALIASES) {
        if (raw.includes(he)) extra += ' ' + en;
        if (raw.includes(en)) extra += ' ' + heToLatin(he);
      }
      return raw + ' ' + latin + extra;
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderCards(list) {
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('no-results');
    const countEl = document.getElementById('result-count');

    if (list.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      countEl.textContent = '';
      return;
    }

    noResults.style.display = 'none';
    countEl.textContent = `${list.length} מסעדות`;

    grid.innerHTML = list.map(r => {
      const name    = escapeHtml(r.name);
      const type    = escapeHtml(r.type);
      const address = escapeHtml(r.address);
      const phone   = escapeHtml(r.phone);
      const hours   = escapeHtml(r.hours ? r.hours.replace(/\n/g, ' | ') : '');

      let body = '';
      if (address) body += `<div class="detail-row"><span class="detail-label">כתובת</span><span class="detail-value">${address}</span></div>`;
      if (phone)   body += `<div class="detail-row"><span class="detail-label">טלפון</span><span class="detail-value"><a href="tel:${phone}">${phone}</a></span></div>`;
      if (hours)   body += `<div class="detail-row"><span class="detail-label">שעות</span><span class="detail-value">${hours}</span></div>`;

      return `<div class="card">
        <div class="card-header">
          <div class="card-name">${name}</div>
          ${type ? `<div class="card-type">${type}</div>` : ''}
        </div>
        <div class="card-body">${body}</div>
      </div>`;
    }).join('');
  }

  function filterRestaurants(query) {
    const q = query.trim().toLowerCase();
    if (!q) return allRestaurants;
    const qLatin = heToLatin(q);
    return allRestaurants.filter((_, i) => {
      const idx = searchIndex[i];
      return idx.includes(q) || (qLatin !== q && idx.includes(qLatin));
    });
  }

  document.getElementById('search').addEventListener('input', function () {
    renderCards(filterRestaurants(this.value));
  });

  function renderDeals(deals) {
    if (!deals || deals.length === 0) return;
    const section = document.getElementById('deals-section');
    const list = document.getElementById('deals-list');
    list.innerHTML = deals.map(d => {
      const label = escapeHtml((d.label || '').replace(/^[\p{Emoji}\s]+/u, '').trim());
      const sub = d.subtitle ? `<span class="deal-sub"> — ${escapeHtml(d.subtitle)}</span>` : '';
      return `<li class="deal-item">${label}${sub}</li>`;
    }).join('');
    section.style.display = 'block';
  }

  async function loadData() {
    try {
      const [restRes, metaRes, dealsRes] = await Promise.all([
        fetch('restaurants.json'),
        fetch('last_updated.json'),
        fetch('deals.json')
      ]);

      allRestaurants = await restRes.json();
      searchIndex = buildIndex(allRestaurants);

      const meta  = await metaRes.json();
      const deals = await dealsRes.json();

      const metaEl = document.getElementById('header-meta');
      if (meta.date) {
        metaEl.textContent = `עודכן: ${meta.date} | ${meta.restaurant_count} מסעדות`;
      } else {
        metaEl.textContent = `${allRestaurants.length} מסעדות`;
      }

      renderDeals(deals);
      renderCards(allRestaurants);
    } catch (err) {
      document.getElementById('header-meta').textContent = 'שגיאה בטעינת הנתונים';
      document.getElementById('no-results').style.display = 'block';
      document.getElementById('no-results').textContent = 'לא ניתן לטעון את רשימת המסעדות';
      console.error(err);
    }
  }

  loadData();
</script>

</body>
</html>
