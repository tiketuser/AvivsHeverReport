<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>חבר - דוח שבועי אביב ניר</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a5fd4'/%3E%3Crect x='8' y='20' width='48' height='28' rx='5' fill='%23ffffff' opacity='0.15'/%3E%3Crect x='8' y='20' width='48' height='28' rx='5' fill='none' stroke='%23ffffff' stroke-width='2'/%3E%3Crect x='8' y='30' width='48' height='6' fill='%23ffffff' opacity='0.25'/%3E%3Crect x='13' y='38' width='14' height='4' rx='2' fill='%23b07d1a'/%3E%3Ccircle cx='46' cy='40' r='5' fill='%23b07d1a' opacity='0.7'/%3E%3Ccircle cx='51' cy='40' r='5' fill='%23c9930f'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rubik:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f5f7fa;
      --surface3: #eaeff5;
      --border: #dde3ec;
      --accent: #1a5fd4;
      --accent-dim: #e8effd;
      --gold: #b07d1a;
      --gold-dim: #c9930f;
      --gold-glow: rgba(176, 125, 26, .12);
      --blue: #1a5fd4;
      --blue-dim: rgba(26, 95, 212, .1);
      --green: #158a3e;
      --green-dim: rgba(21, 138, 62, .1);
      --text: #0f1724;
      --text-dim: #4a5568;
      --text-mute: #9aa5b4;
      --radius: 10px;
      --radius-lg: 16px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ─── NOISE TEXTURE ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.015'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      height: 68px;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: 0;
      left: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-emblem {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--gold) 0%, #8b6920 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--gold-glow);
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .04em;
      white-space: nowrap;
    }

    #title-updated {
      font-family: 'Rubik', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--text-mute);
      letter-spacing: 0;
      margin-right: 0.55em;
    }

    .header-meta {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 300;
      white-space: nowrap;
    }

    /* ─── NAV TABS ─── */
    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 32px 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 68px;
      z-index: 90;
      overflow-x: auto;
      overflow-y: hidden;
      touch-action: pan-x;
      scrollbar-width: none;
    }

    .nav-tabs::-webkit-scrollbar {
      display: none;
    }

    .nav-tab {
      padding: 10px 18px 12px;
      font-family: 'Rubik', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      border: none;
      background: none;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s, border-color .2s;
      position: relative;
    }

    .nav-tab:hover {
      color: var(--text);
    }

    .nav-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .nav-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface3);
      color: var(--text-dim);
      font-size: 0.7rem;
      font-weight: 600;
      min-width: 20px;
      height: 18px;
      border-radius: 9px;
      padding: 0 6px;
      margin-right: 7px;
    }

    .nav-tab.active .nav-tab-count {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* ─── SECTION PANELS ─── */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* ─── DEALS ─── */
    .deals-panel {
      padding: 28px 32px 36px;
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .14em;
      color: var(--text-mute);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .deals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      list-style: none;
    }

    .deal-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }

    .deal-item:hover {
      border-color: rgba(26, 95, 212, .3);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .1), 0 0 0 1px rgba(26, 95, 212, .2);
    }

    .deal-item a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .deal-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .deal-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface2);
    }

    .deal-footer {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .deal-label {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
    }

    .deal-item:hover .deal-label {
      color: var(--accent);
    }

    .deal-sub {
      font-size: 0.74rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    /* ─── SEARCH BAR ─── */
    .search-toolbar {
      padding: 16px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 460px;
    }

    .search-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-mute);
      pointer-events: none;
      font-size: 0.85rem;
    }

    .search-input {
      width: 100%;
      padding: 9px 36px 9px 14px;
      font-size: 0.92rem;
      font-family: 'Rubik', sans-serif;
      font-weight: 400;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      direction: rtl;
      transition: border-color .2s, background .2s;
    }

    .search-input::placeholder {
      color: var(--text-mute);
    }

    .search-input:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    .delivery-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface2);
      transition: all .2s;
      white-space: nowrap;
      user-select: none;
    }

    .delivery-toggle input {
      display: none;
    }

    .delivery-toggle-dot {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: var(--surface3);
      border: 1.5px solid var(--border);
      position: relative;
      transition: background .2s, border-color .2s;
      flex-shrink: 0;
    }

    .delivery-toggle-dot::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-mute);
      top: 2px;
      right: 2px;
      transition: transform .2s, background .2s;
    }

    .delivery-toggle.checked {
      color: var(--green);
      border-color: rgba(34, 197, 94, .3);
      background: var(--green-dim);
    }

    .delivery-toggle.checked .delivery-toggle-dot {
      background: rgba(34, 197, 94, .2);
      border-color: var(--green);
    }

    .delivery-toggle.checked .delivery-toggle-dot::after {
      background: var(--green);
      transform: translateX(-14px);
    }

    /* ─── MAIN CONTENT ─── */
    .panel-content {
      max-width: 1360px;
      margin: 0 auto;
      padding: 24px 32px 56px;
    }

    .result-count {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-weight: 300;
      margin-bottom: 16px;
      letter-spacing: .02em;
    }

    /* ─── RESTAURANT GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 14px;
    }

    /* ─── CARDS ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      transition: opacity .25s;
    }

    .card:hover {
      border-color: rgba(26, 95, 212, .3);
      box-shadow: 0 8px 28px rgba(0, 0, 0, .1), 0 0 0 1px rgba(26, 95, 212, .15);
      transform: translateY(-2px);
    }

    .card:hover::before {
      background: linear-gradient(90deg, transparent, rgba(26, 95, 212, .4), transparent);
      opacity: 1;
    }

    .card.has-delivery {
      border-color: rgba(34, 197, 94, .2);
    }

    .card.has-delivery::before {
      background: linear-gradient(90deg, transparent, rgba(34, 197, 94, .3), transparent);
    }

    .card.has-delivery:hover {
      border-color: rgba(21, 138, 62, .4);
      box-shadow: 0 8px 28px rgba(0, 0, 0, .1), 0 0 0 1px rgba(21, 138, 62, .2);
    }

    .card-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-header-text {
      flex: 1;
      min-width: 0;
    }

    .card-logo {
      width: 46px;
      height: 46px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .card-name {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    a.card-name-link,
    a.shop-name-link {
      text-decoration: none;
      color: inherit;
    }

    a.card-name-link:hover,
    a.shop-name-link:hover {
      text-decoration: underline;
    }

    .card-type {
      font-size: 0.76rem;
      color: var(--accent);
      margin-top: 3px;
      font-weight: 500;
    }

    .delivery-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.69rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-top: 6px;
      letter-spacing: .01em;
    }

    .delivery-badge.has-delivery {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, .25);
    }

    .delivery-badge.seating-only {
      background: var(--surface2);
      color: var(--text-mute);
      border: 1px solid var(--border);
    }

    .delivery-badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .card-body {
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      flex: 1;
    }

    .detail-row {
      display: flex;
      gap: 10px;
      font-size: 0.81rem;
      align-items: flex-start;
      line-height: 1.45;
    }

    .detail-label {
      color: var(--text-mute);
      min-width: 42px;
      flex-shrink: 0;
      font-weight: 400;
      padding-top: 1px;
      font-size: 0.76rem;
    }

    .detail-value {
      color: var(--text-dim);
      font-weight: 300;
    }

    .detail-value a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
      transition: color .15s;
    }

    .detail-value a:hover {
      color: #1246a8;
    }

    /* ─── SHOPS ─── */
    .shop-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }

    .shop-card:hover {
      border-color: rgba(26, 95, 212, .3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, .08);
    }

    .shop-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .shop-card-text {
      flex: 1;
      min-width: 0;
    }

    .shop-name {
      font-size: 0.93rem;
      font-weight: 600;
      color: var(--text);
    }

    .shop-category {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
      margin-top: 2px;
    }

    .shop-online {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.69rem;
      font-weight: 500;
      color: var(--blue);
    }

    .shop-online::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
    }

    /* ─── MAP ─── */
    .map-cta {
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .map-cta p {
      font-size: 0.84rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    .map-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(26, 95, 212, .25);
    }

    .map-cta-btn:hover {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(26, 95, 212, .35);
    }

    /* ─── NO RESULTS ─── */
    .no-results {
      text-align: center;
      color: var(--text-mute);
      font-size: 0.95rem;
      font-weight: 300;
      margin-top: 64px;
      padding-bottom: 40px;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card,
    .shop-card,
    .deal-item {
      animation: fadeSlideUp .3s ease both;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-mute);
    }



    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {

      /* Header: compact, hide meta to avoid overflow */
      header {
        padding: 0 14px;
        height: 56px;
      }

      header h1 {
        font-size: 0.95rem;
      }

      .header-meta {
        display: none;
      }

      .header-emblem {
        width: 32px;
        height: 32px;
        font-size: 0.85rem;
        border-radius: 6px;
      }

      /* Nav tabs: zero horizontal padding, taller tap targets */
      .nav-tabs {
        padding: 0 14px;
        top: 56px;
        gap: 0;
      }

      .nav-tab {
        padding: 14px 13px 15px;
        font-size: 0.82rem;
      }

      .nav-tab-count {
        margin-right: 5px;
        font-size: 0.66rem;
        min-width: 18px;
        height: 16px;
      }

      /* Search toolbar: stack vertically, full width */
      .search-toolbar {
        padding: 12px 14px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .search-input-wrap {
        max-width: 100%;
      }

      .search-input {
        font-size: 1rem;
        padding: 12px 38px 12px 14px;
      }

      .delivery-toggle {
        padding: 11px 14px;
        font-size: 0.88rem;
        justify-content: center;
      }

      /* Panel content */
      .panel-content {
        padding: 14px 14px 64px;
      }

      .result-count {
        font-size: 0.75rem;
        margin-bottom: 12px;
      }

      .deals-panel {
        padding: 18px 14px 28px;
      }

      /* Cards: single column, readable touch-friendly sizes */
      .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .card {
        border-radius: 12px;
      }

      .card-header {
        padding: 14px 14px 12px;
      }

      .card-name {
        font-size: 1rem;
      }

      .card-type {
        font-size: 0.8rem;
      }

      .card-logo {
        width: 44px;
        height: 44px;
      }

      .card-body {
        padding: 12px 14px 16px;
        gap: 8px;
      }

      .detail-row {
        font-size: 0.85rem;
        gap: 8px;
      }

      .detail-label {
        min-width: 40px;
        font-size: 0.78rem;
      }

      .detail-value a {
        display: inline-block;
        padding: 2px 0;
      }

      /* Shops */
      .shop-card {
        padding: 14px;
      }

      .shop-name {
        font-size: 0.97rem;
      }

      /* Deals: 2-column grid on mobile */
      .deals-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .deal-label {
        font-size: 0.8rem;
      }


      /* Kill hover transforms on touch devices */
      .card:hover,
      .shop-card:hover,
      .deal-item:hover {
        transform: none;
      }
    }

    @media (max-width: 380px) {
      .nav-tab {
        padding: 12px 10px 13px;
        font-size: 0.78rem;
      }

      .card-name {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-brand">
      <div class="header-emblem">ח</div>
      <h1> אביב - כרטיס חבר<span id="title-updated"></span></h1>
    </div>
    <div class="header-meta" id="header-meta">טוען נתונים...</div>
  </header>

  <div class="nav-tabs" id="nav-tabs">
    <button class="nav-tab active" data-panel="restaurants" onclick="switchTab('restaurants',this)">
      חבר טעמים
      <span class="nav-tab-count" id="tab-count-restaurants">–</span>
    </button>
    <button class="nav-tab" data-panel="shops" onclick="switchTab('shops',this)">
      כרטיס צהוב
      <span class="nav-tab-count" id="tab-count-shops">–</span>
    </button>
    <button class="nav-tab" id="tab-deals" data-panel="deals" onclick="switchTab('deals',this)" style="display:none;">
      מבצעי השבוע
      <span class="nav-tab-count" id="tab-count-deals">–</span>
    </button>
    <button class="nav-tab" data-panel="map" onclick="switchTab('map',this)">
      מפה
    </button>
  </div>

  <!-- RESTAURANTS PANEL -->
  <div class="panel active" id="panel-restaurants">
    <div class="search-toolbar">
      <div class="search-input-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="search" class="search-input" id="search" placeholder="חיפוש מסעדה, סוג, עיר..." autocomplete="off">
      </div>
      <label class="delivery-toggle" id="delivery-toggle-label">
        <input type="checkbox" id="filter-delivery">
        <div class="delivery-toggle-dot"></div>
        מכובד במשלוחים
      </label>
    </div>
    <div class="panel-content">
      <div class="result-count" id="result-count"></div>
      <div class="grid" id="grid"></div>
      <div class="no-results" id="no-results" style="display:none;">לא נמצאו תוצאות</div>
    </div>
  </div>

  <!-- SHOPS PANEL -->
  <div class="panel" id="panel-shops">
    <div class="search-toolbar">
      <div class="search-input-wrap">
        <span class="search-icon">&#9906;</span>
        <input type="search" class="search-input" id="search-shops" placeholder="חיפוש חנות, קטגוריה..."
          autocomplete="off">
      </div>
    </div>
    <div class="panel-content">
      <div class="result-count" id="shop-count"></div>
      <div class="grid" id="shop-grid"></div>
      <div class="no-results" id="no-results-shops" style="display:none;">לא נמצאו תוצאות</div>
    </div>
  </div>

  <!-- DEALS PANEL -->
  <div class="panel" id="panel-deals">
    <div class="deals-panel">
      <div class="panel-title">מבצעי השבוע</div>
      <ul class="deals-grid" id="deals-list"></ul>
    </div>
  </div>

  <!-- MAP PANEL -->
  <div class="panel" id="panel-map">
    <div class="map-cta"
      style="margin:40px auto;max-width:480px;flex-direction:column;align-items:center;text-align:center;gap:16px">
      <p>מפת בתי העסק זמינה באתר חבר הרשמי</p>
      <a class="map-cta-btn" href="https://www.hvr.co.il/site/pg/maps_hvr" target="_blank" rel="noopener">פתח את מפת חבר
        &larr;</a>
    </div>
  </div>

  <script>
    let allRestaurants = [];
    let searchIndex = [];
    let allCompanies = [];
    let shopIndex = [];

    // ── TAB SWITCHING ──────────────────────────────────────────────
    function switchTab(id, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + id).classList.add('active');
      btn.classList.add('active');
    }

    // ── DELIVERY TOGGLE ────────────────────────────────────────────
    const deliveryCheckbox = document.getElementById('filter-delivery');
    const deliveryLabel = document.getElementById('delivery-toggle-label');
    deliveryCheckbox.addEventListener('change', function () {
      deliveryLabel.classList.toggle('checked', this.checked);
      applyRestaurantFilters();
    });

    // ── SEARCH LOGIC ───────────────────────────────────────────────
    const HE_MAP = {
      'א': '', 'ב': 'b', 'ג': 'g', 'ד': 'd', 'ה': '', 'ו': '', 'ז': 'z',
      'ח': 'h', 'ט': 't', 'י': '', 'כ': 'k', 'ך': 'k', 'ל': 'l', 'מ': 'm',
      'ם': 'm', 'נ': 'n', 'ן': 'n', 'ס': 's', 'ע': '', 'פ': 'p', 'ף': 'f',
      'צ': 'ts', 'ץ': 'ts', 'ק': 'k', 'ר': 'r', 'ש': 'sh', 'ת': 't'
    };

    function heSkeleton(str) {
      const latin = str.split('').map(c => HE_MAP[c] !== undefined ? HE_MAP[c] : c).join('');
      return latin.replace(/(.)\1+/g, '$1');
    }

    function stripPunctuation(str) {
      return str.replace(/['\u2019\u2018"״׳`\-_.]/g, '');
    }

    function buildIndex(restaurants) {
      return restaurants.map(r => {
        const raw = stripPunctuation([r.name, r.type, r.address].filter(Boolean).join(' ').toLowerCase());
        return { raw, skel: heSkeleton(raw) };
      });
    }

    function buildShopIndex(companies) {
      return companies.map(c => {
        const raw = stripPunctuation([c.name, c.category].filter(Boolean).join(' ').toLowerCase());
        return { raw, skel: heSkeleton(raw) };
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const SYNONYMS = [
      ['המבורגר', 'המבורגרים', 'בורגר', 'burger', 'burgers'],
      ['פיצה', 'פיצריה', 'פיצות', 'pizza'],
      ['סושי', 'יפני', 'יפנית'],
      ['סטייק', 'בשר', 'steakhouse', 'גריל'],
      ['שניצל'],
      ['מקסיקני', 'מקסיקו'],
      ['איטלקי', 'איטלייה', 'pasta', 'פסטה'],
      ['סלט', 'סלדים', 'שף'],
      ['ים תיכוני', 'לבנוני', 'ערבי', 'מזרחי'],
      ['קפה', 'בית קפה', 'קפיטריה', 'cafe'],
      ['אסייתי', 'תאילנדי', 'סיני', 'וייטנאמי'],
      ['הודי', 'הינדי'],
      ['ברביקיו', 'bbq'],
      ['דגים', 'פירות ים', 'seafood'],
      ['ממולאים', 'בלקני'],
      ['vegetarian', 'צמחוני', 'טבעוני', 'vegan'],
      ['כשר', 'כשרות'],
      ['חומוס', 'פלאפל'],
      ['אוכל ביתי', 'מטבח ביתי'],
    ];

    function expandTokens(tokens) {
      return tokens.map(tok => {
        const group = SYNONYMS.find(g => g.includes(tok));
        return group || [tok];
      });
    }

    function tokenMatches(tokenVariants, entry) {
      return tokenVariants.some(v => {
        if (entry.raw.includes(v)) return true;
        const vSkel = heSkeleton(v);
        return vSkel.length >= 2 && entry.skel.includes(vSkel);
      });
    }

    function filterList(query, list, index) {
      const q = stripPunctuation(query.trim().toLowerCase());
      if (!q) return list;
      const rawTokens = q.split(/\s+/).filter(Boolean);
      const expandedTokens = expandTokens(rawTokens);
      return list.filter((_, i) =>
        expandedTokens.every(variants => tokenMatches(variants, index[i]))
      );
    }

    // ── RENDER RESTAURANTS ─────────────────────────────────────────
    function renderCards(list) {
      const grid = document.getElementById('grid');
      const noResults = document.getElementById('no-results');
      const countEl = document.getElementById('result-count');

      if (list.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        countEl.textContent = '';
        return;
      }

      noResults.style.display = 'none';
      countEl.textContent = `${list.length} מסעדות`;

      grid.innerHTML = list.map((r, i) => {
        const name = escapeHtml(r.name);
        const type = escapeHtml(r.type);
        const address = escapeHtml(r.address);
        const phone = escapeHtml(r.phone);
        const hours = escapeHtml(r.hours ? r.hours.replace(/\n/g, ' | ') : '');
        const services = escapeHtml(r.services || '');
        const notes = escapeHtml(r.notes || '');
        const hasDelivery = (r.type || '').includes('מארזים במשלוח') ||
          (r.services || '').includes('משלוחים') ||
          (r.notes || '').includes('משלוחים');

        let body = '';
        if (address) body += `<div class="detail-row"><span class="detail-label">כתובת</span><span class="detail-value">${address}</span></div>`;
        if (phone) body += `<div class="detail-row"><span class="detail-label">טלפון</span><span class="detail-value"><a href="tel:${phone}">${phone}</a></span></div>`;
        if (hours) body += `<div class="detail-row"><span class="detail-label">שעות</span><span class="detail-value">${hours}</span></div>`;
        if (notes) body += `<div class="detail-row"><span class="detail-label">הערות</span><span class="detail-value">${notes}</span></div>`;
        if (services) body += `<div class="detail-row"><span class="detail-label">פרטים נוספים</span><span class="detail-value">${services}</span></div>`;

        const logoHtml = r.logo ? `<img class="card-logo" src="${escapeHtml(r.logo)}" alt="${name}" loading="lazy">` : '';
        const badge = hasDelivery
          ? `<span class="delivery-badge has-delivery">גם במשלוח</span>`
          : `<span class="delivery-badge seating-only">ישיבה בלבד</span>`;

        return `<div class="card${hasDelivery ? ' has-delivery' : ''}" style="animation-delay:${Math.min(i, 20) * 18}ms">
        <div class="card-header">
          ${logoHtml}
          <div class="card-header-text">
            <a class="card-name card-name-link" href="https://www.google.com/search?q=${encodeURIComponent(r.name)}" target="_blank" rel="noopener noreferrer">${name}</a>
            ${type ? `<div class="card-type">${type}</div>` : ''}
            ${badge}
          </div>
        </div>
        <div class="card-body">${body}</div>
      </div>`;
      }).join('');
    }

    // ── RENDER SHOPS ───────────────────────────────────────────────
    function renderShops(list) {
      const grid = document.getElementById('shop-grid');
      const noResults = document.getElementById('no-results-shops');
      const countEl = document.getElementById('shop-count');

      if (list.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        countEl.textContent = '';
        return;
      }

      noResults.style.display = 'none';
      countEl.textContent = `${list.length} חנויות`;

      grid.innerHTML = list.map((c, i) => {
        const name = escapeHtml(c.name);
        const category = escapeHtml(c.category);
        const onlineTag = c.online ? `<div class="shop-online">מכובד באונליין</div>` : '';
        const logoHtml = c.logo ? `<img class="card-logo" src="${escapeHtml(c.logo)}" alt="${name}" loading="lazy">` : '';
        return `<div class="shop-card" style="animation-delay:${Math.min(i, 20) * 18}ms">
        <div class="shop-card-header">
          ${logoHtml}
          <div class="shop-card-text">
            <a class="shop-name shop-name-link" href="https://www.google.com/search?q=${encodeURIComponent(c.name)}" target="_blank" rel="noopener noreferrer">${name}</a>
            ${category ? `<div class="shop-category">${category}</div>` : ''}
          </div>
        </div>
        ${onlineTag}
      </div>`;
      }).join('');
    }

    // ── RENDER DEALS ───────────────────────────────────────────────
    function renderDeals(deals) {
      if (!deals || deals.length === 0) return;
      document.getElementById('tab-deals').style.display = 'flex';
      document.getElementById('tab-count-deals').textContent = deals.length;
      document.getElementById('deals-list').innerHTML = deals.map((d, i) => {
        const label = escapeHtml((d.label || '').replace(/^[\p{Emoji}\s]+/u, '').trim());
        const sub = d.subtitle ? `<div class="deal-sub">${escapeHtml(d.subtitle)}</div>` : '';
        const imgHtml = d.image
          ? `<img class="deal-img" src="${escapeHtml(d.image)}" alt="${label}" loading="lazy">`
          : `<div class="deal-img-placeholder"></div>`;
        const footer = `<div class="deal-footer"><span class="deal-label">${label}</span>${sub}</div>`;
        const inner = imgHtml + footer;
        if (d.url) {
          return `<li class="deal-item" style="animation-delay:${i * 30}ms"><a href="${escapeHtml(d.url)}" target="_blank" rel="noopener">${inner}</a></li>`;
        }
        return `<li class="deal-item" style="animation-delay:${i * 30}ms">${inner}</li>`;
      }).join('');
    }

    // ── FILTER HANDLERS ────────────────────────────────────────────
    function applyRestaurantFilters() {
      const query = document.getElementById('search').value;
      const deliveryOnly = document.getElementById('filter-delivery').checked;
      let list = filterList(query, allRestaurants, searchIndex);
      if (deliveryOnly) list = list.filter(r =>
        (r.type || '').includes('מארזים במשלוח') ||
        (r.services || '').includes('משלוחים') ||
        (r.notes || '').includes('משלוחים')
      );
      renderCards(list);
    }

    function debounce(fn, delay) {
      let timer;
      return function (...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
    }

    document.getElementById('search').addEventListener('input', debounce(applyRestaurantFilters, 250));
    document.getElementById('search-shops').addEventListener('input', debounce(function () {
      renderShops(filterList(this.value, allCompanies, shopIndex));
    }, 250));

    // ── DATA LOADING ───────────────────────────────────────────────
    async function loadData() {
      try {
        const [restRes, metaRes, dealsRes, gcRes] = await Promise.all([
          fetch('restaurants.json'),
          fetch('last_updated.json'),
          fetch('deals.json'),
          fetch('giftcard.json')
        ]);

        allRestaurants = await restRes.json();
        searchIndex = buildIndex(allRestaurants);

        allCompanies = await gcRes.json();
        shopIndex = buildShopIndex(allCompanies);

        const meta = await metaRes.json();
        const deals = await dealsRes.json();

        document.getElementById('tab-count-restaurants').textContent = allRestaurants.length;
        document.getElementById('tab-count-shops').textContent = allCompanies.length;

        const metaEl = document.getElementById('header-meta');
        if (meta.date) {
          const compCount = meta.company_count ? ` · ${meta.company_count} חנויות` : '';
          metaEl.textContent = `עודכן: ${meta.date} · ${meta.restaurant_count} מסעדות${compCount}`;
          document.title = `חבר - דוח שבועי אביב ניר | עודכן: ${meta.date}${meta.time ? ' ' + meta.time : ''}`;
          const titleUpdated = document.getElementById('title-updated');
          if (titleUpdated) titleUpdated.textContent = `עודכן ${meta.date}${meta.time ? ' ' + meta.time : ''}`;
        } else {
          metaEl.textContent = `${allRestaurants.length} מסעדות`;
        }

        renderDeals(deals);
        renderCards(allRestaurants);
        renderShops(allCompanies);
      } catch (err) {
        document.getElementById('header-meta').textContent = 'שגיאה בטעינת הנתונים';
        document.getElementById('no-results').style.display = 'block';
        document.getElementById('no-results').textContent = 'לא ניתן לטעון את רשימת המסעדות';
        console.error(err);
      }
    }

    loadData();
  </script>


</body>

</html>
