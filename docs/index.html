<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חבר טעמים</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      direction: rtl;
    }

    header {
      background: #fff;
      border-bottom: 3px solid #0057b7;
      padding: 20px 24px 16px;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0057b7;
    }

    .header-meta {
      font-size: 0.85rem;
      color: #666;
      margin-top: 6px;
    }

    .search-wrap {
      margin-top: 14px;
    }

    #search {
      width: 100%;
      max-width: 560px;
      padding: 10px 14px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-family: inherit;
      direction: rtl;
    }

    #search:focus {
      border-color: #0057b7;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    #result-count {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .card-type {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 10px;
    }

    .card-details {
      font-size: 0.88rem;
      color: #444;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card-details a {
      color: #0057b7;
      text-decoration: none;
    }

    .card-details a:hover {
      text-decoration: underline;
    }

    .detail-row {
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    .detail-label {
      color: #999;
      min-width: 52px;
      flex-shrink: 0;
    }

    .no-results {
      text-align: center;
      color: #888;
      font-size: 1rem;
      margin-top: 48px;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>חבר טעמים 🍽️</h1>
  </div>
  <div class="header-meta" id="header-meta">טוען נתונים...</div>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="חיפוש לפי שם, סוג, כתובת..." autocomplete="off">
  </div>
</header>

<main>
  <div id="result-count"></div>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="no-results" style="display:none;">לא נמצאו תוצאות</div>
</main>

<script>
  let allRestaurants = [];

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderCards(list) {
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('no-results');
    const countEl = document.getElementById('result-count');

    if (list.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      countEl.textContent = '';
      return;
    }

    noResults.style.display = 'none';
    countEl.textContent = `מציג ${list.length} מסעדות`;

    grid.innerHTML = list.map(r => {
      const name = escapeHtml(r.name);
      const type = escapeHtml(r.type);
      const address = escapeHtml(r.address);
      const phone = escapeHtml(r.phone);
      const hours = escapeHtml(r.hours);

      let details = '';
      if (address) {
        details += `<div class="detail-row"><span class="detail-label">כתובת:</span><span>${address}</span></div>`;
      }
      if (phone) {
        details += `<div class="detail-row"><span class="detail-label">טלפון:</span><span><a href="tel:${phone}">${phone}</a></span></div>`;
      }
      if (hours) {
        details += `<div class="detail-row"><span class="detail-label">שעות:</span><span>${hours}</span></div>`;
      }

      return `<div class="card">
        <div class="card-name">${name}</div>
        ${type ? `<div class="card-type">${type}</div>` : ''}
        <div class="card-details">${details}</div>
      </div>`;
    }).join('');
  }

  function filterRestaurants(query) {
    if (!query.trim()) return allRestaurants;
    const q = query.trim().toLowerCase();
    return allRestaurants.filter(r =>
      (r.name && r.name.toLowerCase().includes(q)) ||
      (r.type && r.type.toLowerCase().includes(q)) ||
      (r.address && r.address.toLowerCase().includes(q))
    );
  }

  document.getElementById('search').addEventListener('input', function () {
    renderCards(filterRestaurants(this.value));
  });

  async function loadData() {
    try {
      const [restRes, metaRes] = await Promise.all([
        fetch('restaurants.json'),
        fetch('last_updated.json')
      ]);

      allRestaurants = await restRes.json();
      const meta = await metaRes.json();

      const metaEl = document.getElementById('header-meta');
      if (meta.date) {
        metaEl.textContent = `עודכן לאחרונה: ${meta.date} | ${meta.restaurant_count} מסעדות`;
      } else {
        metaEl.textContent = `${allRestaurants.length} מסעדות`;
      }

      renderCards(allRestaurants);
    } catch (err) {
      document.getElementById('header-meta').textContent = 'שגיאה בטעינת הנתונים';
      document.getElementById('no-results').style.display = 'block';
      document.getElementById('no-results').textContent = 'לא ניתן לטעון את רשימת המסעדות';
      console.error(err);
    }
  }

  loadData();
</script>

</body>
</html>
