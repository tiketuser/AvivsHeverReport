<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> חבר - דוח שבועי</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      direction: rtl;
    }

    header {
      background: #fff;
      border-bottom: 3px solid #0057b7;
      padding: 20px 28px 16px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0057b7;
    }

    .header-meta {
      font-size: 0.85rem;
      color: #777;
      margin-top: 5px;
    }

    .deals-section {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 28px 20px;
    }

    .deals-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      list-style: none;
    }

    .deal-item {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .deal-item a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .deal-item a:hover .deal-label {
      color: #0057b7;
    }

    .deal-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .deal-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: #f0f2f5;
    }

    .deal-footer {
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .deal-label {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
      color: #1a1a1a;
    }

    .deal-sub {
      font-size: 0.75rem;
      color: #888;
    }

    .deal-link {
      font-size: 0.72rem;
      color: #0057b7;
      margin-top: 3px;
    }

    .search-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-bar h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      white-space: nowrap;
    }

    #search, #search-shops {
      flex: 1;
      min-width: 220px;
      max-width: 500px;
      padding: 9px 14px;
      font-size: 0.95rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-family: inherit;
      direction: rtl;
      background: #fafafa;
    }

    #search:focus, #search-shops:focus {
      border-color: #0057b7;
      background: #fff;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 20px 48px;
    }

    #result-count {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header-text {
      flex: 1;
      min-width: 0;
    }

    .card-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid #e2e5ea;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: #0d1a2e;
      line-height: 1.3;
    }

    .card-type {
      font-size: 0.78rem;
      color: #0057b7;
      margin-top: 3px;
      font-weight: 500;
    }

    .card-body {
      padding: 10px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      font-size: 0.83rem;
      align-items: flex-start;
      line-height: 1.4;
    }

    .detail-label {
      color: #aaa;
      min-width: 44px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .detail-value {
      color: #333;
    }

    .detail-value a {
      color: #0057b7;
      text-decoration: none;
      font-weight: 500;
    }

    .detail-value a:hover {
      text-decoration: underline;
    }

    .delivery-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 5px;
    }

    .delivery-badge.has-delivery {
      background: #e6f7ec;
      color: #1a7a3a;
      border: 1px solid #a3d9b5;
    }

    .delivery-badge.seating-only {
      background: #f0f0f0;
      color: #777;
      border: 1px solid #ddd;
    }

    .card.has-delivery {
      border-color: #a3d9b5;
      border-width: 1.5px;
    }

    .no-results {
      text-align: center;
      color: #aaa;
      font-size: 1rem;
      margin-top: 60px;
    }

    .section-header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .section-header:hover { background: #fafafa; }

    .section-header-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .section-toggle {
      font-size: 0.8rem;
      color: #888;
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
    }

    .section-toggle:hover { border-color: #aaa; color: #555; }

    .section-body { display: block; }
    .section-body.collapsed { display: none; }

    .shop-card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .shop-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shop-card-text {
      flex: 1;
      min-width: 0;
    }

    .shop-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0d1a2e;
    }

    .shop-category {
      font-size: 0.78rem;
      color: #0057b7;
      font-weight: 500;
    }

    .shop-online {
      font-size: 0.72rem;
      color: #2a9d2a;
      font-weight: 500;
    }

    .map-section {
      background: #fff;
      border-top: 1px solid #e0e0e0;
    }

    #map-frame {
      width: 100%;
      height: 420px;
      border: none;
      display: block;
    }

    .map-cta {
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .map-cta p {
      font-size: 0.88rem;
      color: #555;
    }

    .map-cta a {
      display: inline-block;
      background: #0057b7;
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .map-cta a:hover { background: #004299; }

    @media (max-width: 520px) {
      header h1 { font-size: 1.4rem; }
      .search-bar { flex-direction: column; align-items: stretch; }
      .grid { grid-template-columns: 1fr; }
      .section-header { padding: 12px 16px; }
      #map-frame { height: 280px; }
    }
  </style>
</head>
<body>

<header>
  <h1>כרטיס חבר - דוח שבועי</h1>
  <div class="header-meta" id="header-meta">טוען נתונים...</div>
</header>

<!-- Deals section -->
<div id="deals-section" style="display:none;">
  <div class="section-header" onclick="toggleSection('deals')">
    <span class="section-header-title">מבצעי השבוע</span>
    <button class="section-toggle" id="toggle-deals">הצג</button>
  </div>
  <div class="section-body collapsed" id="body-deals">
    <div class="deals-section">
      <ul class="deals-list" id="deals-list"></ul>
    </div>
  </div>
</div>

<!-- Restaurants section -->
<div id="restaurants-section">
  <div class="section-header" onclick="toggleSection('restaurants')">
    <span class="section-header-title">חבר טעמים</span>
    <button class="section-toggle" id="toggle-restaurants">הצג</button>
  </div>
  <div class="section-body collapsed" id="body-restaurants">
    <div class="search-bar">
      <input type="search" id="search" placeholder="חיפוש מסעדה, סוג, עיר..." autocomplete="off">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.88rem;color:#1a7a3a;font-weight:600;cursor:pointer;white-space:nowrap;">
        <input type="checkbox" id="filter-delivery" style="cursor:pointer;width:16px;height:16px;accent-color:#1a7a3a;">
        משלוחים בלבד
      </label>
    </div>
    <main>
      <div id="result-count"></div>
      <div class="grid" id="grid"></div>
      <div class="no-results" id="no-results" style="display:none;">לא נמצאו תוצאות</div>
    </main>
  </div>
</div>

<!-- Shops section -->
<div id="shops-section">
  <div class="section-header" onclick="toggleSection('shops')">
    <span class="section-header-title">כרטיס צהוב</span>
    <button class="section-toggle" id="toggle-shops">הצג</button>
  </div>
  <div class="section-body collapsed" id="body-shops">
    <div class="search-bar">
      <input type="search" id="search-shops" placeholder="חיפוש חנות, קטגוריה..." autocomplete="off">
    </div>
    <main>
      <div id="shop-count"></div>
      <div class="grid" id="shop-grid"></div>
      <div class="no-results" id="no-results-shops" style="display:none;">לא נמצאו תוצאות</div>
    </main>
  </div>
</div>

<!-- Map section -->
<div class="map-section">
  <div class="section-header" onclick="toggleSection('map')">
    <span class="section-header-title">מפת בתי עסק</span>
    <button class="section-toggle" id="toggle-map">הצג</button>
  </div>
  <div class="section-body collapsed" id="body-map">
    <iframe
      id="map-frame"
      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1781018.8269803966!2d34.8516!3d31.0461!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1siw!2sil!4v1700000000000!5m2!1siw!2sil"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      title="מפת ישראל"
    ></iframe>
    <div class="map-cta">
      <p>למפה המלאה עם כל בתי העסק המשתתפים, סינון לפי קטגוריה ומיקום נוכחי:</p>
      <a href="https://www.hvr.co.il/site/pg/maps_hvr" target="_blank" rel="noopener">פתח את מפת חבר ←</a>
    </div>
  </div>
</div>

<script>
  let allRestaurants = [];
  let searchIndex = [];
  let allCompanies = [];
  let shopIndex = [];

  function toggleSection(id) {
    const body = document.getElementById(`body-${id}`);
    const btn = document.getElementById(`toggle-${id}`);
    const collapsed = body.classList.toggle('collapsed');
    btn.textContent = collapsed ? 'הצג' : 'הסתר';
  }

  // Hebrew → consonant skeleton (drop vowel letters, normalize sounds)
  const HE_MAP = {
    'א':'','ב':'b','ג':'g','ד':'d','ה':'','ו':'','ז':'z',
    'ח':'h','ט':'t','י':'','כ':'k','ך':'k','ל':'l','מ':'m',
    'ם':'m','נ':'n','ן':'n','ס':'s','ע':'','פ':'p','ף':'f',
    'צ':'ts','ץ':'ts','ק':'k','ר':'r','ש':'sh','ת':'t'
  };

  // Latin → consonant skeleton (strip vowels, normalize)
  function latinSkeleton(str) {
    return str
      .toLowerCase()
      .replace(/sh/g,'§') // protect digraph
      .replace(/ch/g,'h')
      .replace(/ck/g,'k')
      .replace(/ph/g,'f')
      .replace(/§/g,'sh')
      .replace(/[aeiou]/g,'')  // strip vowels
      .replace(/(.)\1+/g,'$1') // collapse doubles: bb→b
      .trim();
  }

  function heSkeleton(str) {
    const latin = str.split('').map(c => HE_MAP[c] !== undefined ? HE_MAP[c] : c).join('');
    return latin.replace(/(.)\1+/g,'$1');
  }

  function buildIndex(restaurants) {
    return restaurants.map(r => {
      const raw = [r.name, r.type, r.address].filter(Boolean).join(' ').toLowerCase();
      return { raw, skel: heSkeleton(raw) };
    });
  }

  function buildShopIndex(companies) {
    return companies.map(c => {
      const raw = [c.name, c.category].filter(Boolean).join(' ').toLowerCase();
      return { raw, skel: heSkeleton(raw) };
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderCards(list) {
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('no-results');
    const countEl = document.getElementById('result-count');

    if (list.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      countEl.textContent = '';
      return;
    }

    noResults.style.display = 'none';
    countEl.textContent = `${list.length} מסעדות`;

    grid.innerHTML = list.map(r => {
      const name    = escapeHtml(r.name);
      const type    = escapeHtml(r.type);
      const address = escapeHtml(r.address);
      const phone   = escapeHtml(r.phone);
      const hours   = escapeHtml(r.hours ? r.hours.replace(/\n/g, ' | ') : '');
      const hasDelivery = (r.type || '').includes('מארזים במשלוח');

      let body = '';
      if (address) body += `<div class="detail-row"><span class="detail-label">כתובת</span><span class="detail-value">${address}</span></div>`;
      if (phone)   body += `<div class="detail-row"><span class="detail-label">טלפון</span><span class="detail-value"><a href="tel:${phone}">${phone}</a></span></div>`;
      if (hours)   body += `<div class="detail-row"><span class="detail-label">שעות</span><span class="detail-value">${hours}</span></div>`;

      const logoHtml = r.logo ? `<img class="card-logo" src="${escapeHtml(r.logo)}" alt="${name}" loading="lazy">` : '';
      const badge = hasDelivery
        ? `<span class="delivery-badge has-delivery">גם במשלוח</span>`
        : `<span class="delivery-badge seating-only">ישיבה בלבד</span>`;
      return `<div class="card${hasDelivery ? ' has-delivery' : ''}">
        <div class="card-header">
          ${logoHtml}
          <div class="card-header-text">
            <div class="card-name">${name}</div>
            ${type ? `<div class="card-type">${type}</div>` : ''}
            ${badge}
          </div>
        </div>
        <div class="card-body">${body}</div>
      </div>`;
    }).join('');
  }

  // Keyword synonyms: typing any of these terms expands to all listed variants
  const SYNONYMS = [
    ['המבורגר','המבורגרים','בורגר','burger','burgers'],
    ['פיצה','פיצריה','פיצות','pizza'],
    ['סושי','יפני','יפנית'],
    ['סטייק','בשר','steakhouse','גריל'],
    ['שניצל'],
    ['מקסיקני','מקסיקו'],
    ['איטלקי','איטלייה','pasta','פסטה'],
    ['סלט','סלדים','שף'],
    ['ים תיכוני','לבנוני','ערבי','מזרחי'],
    ['קפה','בית קפה','קפיטריה','cafe'],
    ['אסייתי','תאילנדי','סיני','וייטנאמי'],
    ['הודי','הינדי'],
    ['ברביקיו','bbq'],
    ['דגים','פירות ים','seafood'],
    ['ממולאים','בלקני'],
    ['vegetarian','צמחוני','טבעוני','vegan'],
    ['כשר','כשרות'],
    ['חומוס','פלאפל'],
    ['אוכל ביתי','מטבח ביתי'],
  ];

  function expandTokens(tokens) {
    return tokens.map(tok => {
      const group = SYNONYMS.find(g => g.includes(tok));
      return group || [tok];
    });
  }

  function tokenMatches(tokenVariants, entry) {
    // A token matches if ANY of its variants appears in raw or skel
    return tokenVariants.some(v => {
      if (entry.raw.includes(v)) return true;
      const vSkel = heSkeleton(v);
      return vSkel.length >= 2 && entry.skel.includes(vSkel);
    });
  }

  function filterList(query, list, index) {
    const q = query.trim().toLowerCase();
    if (!q) return list;

    // Split into tokens (space-separated), expand each with synonyms
    const rawTokens = q.split(/\s+/).filter(Boolean);
    const expandedTokens = expandTokens(rawTokens);

    // Every token group must match (AND logic)
    return list.filter((_, i) =>
      expandedTokens.every(variants => tokenMatches(variants, index[i]))
    );
  }

  function renderShops(list) {
    const grid = document.getElementById('shop-grid');
    const noResults = document.getElementById('no-results-shops');
    const countEl = document.getElementById('shop-count');

    if (list.length === 0) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      countEl.textContent = '';
      return;
    }

    noResults.style.display = 'none';
    countEl.textContent = `${list.length} חנויות`;

    grid.innerHTML = list.map(c => {
      const name = escapeHtml(c.name);
      const category = escapeHtml(c.category);
      const onlineTag = c.online ? `<div class="shop-online">מכובד באונליין</div>` : '';
      const logoHtml = c.logo ? `<img class="card-logo" src="${escapeHtml(c.logo)}" alt="${name}" loading="lazy">` : '';
      return `<div class="shop-card">
        <div class="shop-card-header">
          ${logoHtml}
          <div class="shop-card-text">
            <div class="shop-name">${name}</div>
            ${category ? `<div class="shop-category">${category}</div>` : ''}
          </div>
        </div>
        ${onlineTag}
      </div>`;
    }).join('');
  }

  function applyRestaurantFilters() {
    const query = document.getElementById('search').value;
    const deliveryOnly = document.getElementById('filter-delivery').checked;
    let list = filterList(query, allRestaurants, searchIndex);
    if (deliveryOnly) list = list.filter(r => (r.type || '').includes('מארזים במשלוח'));
    renderCards(list);
  }

  document.getElementById('search').addEventListener('input', applyRestaurantFilters);
  document.getElementById('filter-delivery').addEventListener('change', applyRestaurantFilters);

  document.getElementById('search-shops').addEventListener('input', function () {
    renderShops(filterList(this.value, allCompanies, shopIndex));
  });

  function renderDeals(deals) {
    if (!deals || deals.length === 0) return;
    document.getElementById('deals-section').style.display = 'block';
    document.getElementById('deals-list').innerHTML = deals.map(d => {
      const label = escapeHtml((d.label || '').replace(/^[\p{Emoji}\s]+/u, '').trim());
      const sub = d.subtitle ? `<div class="deal-sub">${escapeHtml(d.subtitle)}</div>` : '';
      const imgHtml = d.image
        ? `<img class="deal-img" src="${escapeHtml(d.image)}" alt="${label}" loading="lazy">`
        : `<div class="deal-img-placeholder"></div>`;
      const footer = `<div class="deal-footer"><span class="deal-label">${label}</span>${sub}</div>`;
      const inner = imgHtml + footer;
      if (d.url) {
        return `<li class="deal-item"><a href="${escapeHtml(d.url)}" target="_blank" rel="noopener">${inner}</a></li>`;
      }
      return `<li class="deal-item">${inner}</li>`;
    }).join('');
  }

  async function loadData() {
    try {
      const [restRes, metaRes, dealsRes, gcRes] = await Promise.all([
        fetch('restaurants.json'),
        fetch('last_updated.json'),
        fetch('deals.json'),
        fetch('giftcard.json')
      ]);

      allRestaurants = await restRes.json();
      searchIndex = buildIndex(allRestaurants);

      allCompanies = await gcRes.json();
      shopIndex = buildShopIndex(allCompanies);

      const meta  = await metaRes.json();
      const deals = await dealsRes.json();

      const metaEl = document.getElementById('header-meta');
      if (meta.date) {
        const compCount = meta.company_count ? ` | ${meta.company_count} חנויות` : '';
        metaEl.textContent = `עודכן: ${meta.date} | ${meta.restaurant_count} מסעדות${compCount}`;
      } else {
        metaEl.textContent = `${allRestaurants.length} מסעדות`;
      }

      renderDeals(deals);
      renderCards(allRestaurants);
      renderShops(allCompanies);
    } catch (err) {
      document.getElementById('header-meta').textContent = 'שגיאה בטעינת הנתונים';
      document.getElementById('no-results').style.display = 'block';
      document.getElementById('no-results').textContent = 'לא ניתן לטעון את רשימת המסעדות';
      console.error(err);
    }
  }

  loadData();
</script>

</body>
</html>
